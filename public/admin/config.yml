# ============================================================
# CONFIGURACIÓN DECAP CMS — Funda Crecer
# ------------------------------------------------------------
# Configurado para PRODUCCIÓN con Netlify + Git Gateway.
# Los cambios que hagas en /admin se commitean a GitHub y
# Netlify redespliega automáticamente.
# ============================================================

backend:
  name: git-gateway
  branch: main
  # Mensajes de commit personalizados en español
  commit_messages:
    create: 'Crear {{collection}} "{{slug}}"'
    update: 'Actualizar {{collection}} "{{slug}}"'
    delete: 'Eliminar {{collection}} "{{slug}}"'
    uploadMedia: 'Subir imagen "{{path}}"'
    deleteMedia: 'Eliminar imagen "{{path}}"'

# Habilita modo local con `npx decap-server` (solo para desarrollo local)
# En producción no afecta, pero lo comentamos para evitar warnings.
# local_backend: true

# Configuración de Media (imágenes)
media_folder: "public/images/uploads"
public_folder: "/images/uploads"

# Interfaz en Español
locale: 'es'

# URL del sitio en Netlify (aparece en el botón "View site" del panel)
site_url: https://clinquant-phoenix-0754e5.netlify.app
display_url: https://clinquant-phoenix-0754e5.netlify.app

# Mejor UX: mostrar preview de cambios antes de publicar
publish_mode: simple

collections:
  # ============================================================
  # 1. NOTICIAS / BLOG
  # ============================================================
  - name: "news"
    label: "📰 Noticias"
    label_singular: "Noticia"
    folder: "content/news"
    create: true
    slug: "{{slug}}"
    summary: "{{title}} — {{date | date('DD/MM/YYYY')}}"
    sortable_fields: ['date', 'title']
    view_filters:
      - label: "Publicadas este año"
        field: date
        pattern: '2025'
    fields:
      - { label: "Título", name: "title", widget: "string", hint: "Ej: Inauguramos la biblioteca comunitaria" }
      - { label: "Slug (URL amigable)", name: "slug", widget: "string", hint: "Se generará la ruta /noticias/tu-slug", pattern: ['^[a-z0-9-]+$', 'Solo minúsculas, números y guiones'] }
      - { label: "Imagen de Portada", name: "cover_image", widget: "image", required: false, hint: "Recomendado 1600x900px" }
      - { label: "Fecha de Publicación", name: "date", widget: "datetime", default: "", format: "YYYY-MM-DD", date_format: "DD/MM/YYYY", time_format: false }
      - { label: "Autor", name: "author", widget: "string", default: "Equipo Funda Crecer" }
      - { label: "Cuerpo de la Publicación", name: "body", widget: "markdown", hint: "Editor visual: negritas, listas, imágenes, enlaces" }

  # ============================================================
  # 2. PROYECTOS / CAMPAÑAS
  # ============================================================
  - name: "projects"
    label: "🎯 Proyectos"
    label_singular: "Proyecto"
    folder: "content/projects"
    create: true
    slug: "{{slug}}"
    summary: "{{name}} — {{status}}"
    fields:
      - { label: "Nombre del Proyecto", name: "name", widget: "string" }
      - { label: "Slug", name: "slug", widget: "string", pattern: ['^[a-z0-9-]+$', 'Solo minúsculas, números y guiones'] }
      - { label: "Descripción Corta", name: "short_description", widget: "text", hint: "Máximo 2-3 líneas" }
      - label: "Estado"
        name: "status"
        widget: "select"
        options: ["Activo", "Completado"]
        default: "Activo"
      - { label: "Imagen principal", name: "cover_image", widget: "image", required: false }
      - label: "Galería de Imágenes"
        name: "gallery"
        widget: "list"
        required: false
        summary: "{{fields.caption}}"
        field:
          label: "Imagen"
          name: "image"
          widget: "image"

  # ============================================================
  # 3. PREGUNTAS FRECUENTES (FAQ)
  # ============================================================
  - name: "faqs"
    label: "❓ Preguntas Frecuentes"
    label_singular: "Pregunta"
    folder: "content/faqs"
    create: true
    slug: "{{slug}}"
    summary: "{{question}}"
    sortable_fields: ['order', 'question']
    fields:
      - { label: "Pregunta", name: "question", widget: "string" }
      - { label: "Slug", name: "slug", widget: "string", pattern: ['^[a-z0-9-]+$', 'Solo minúsculas, números y guiones'] }
      - { label: "Categoría", name: "category", widget: "select", options: ["General", "Donaciones", "Voluntariado", "Proyectos"], default: "General" }
      - { label: "Orden", name: "order", widget: "number", default: 1, value_type: "int", hint: "Menor número = aparece primero" }
      - { label: "Respuesta", name: "answer", widget: "markdown" }
